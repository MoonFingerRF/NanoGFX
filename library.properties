name=NanoGFX
version=1.0.0
author=MoonFingerRF
maintainer=MoonFingerRF
sentence=15-color packed-nibble graphics: 2 pixels/byte canvases with RLE fused into drawing, dual-parity fonts, split-polling QSPI writes, and dirty-band frame flushing.
paragraph=An Adafruit_GFX-compatible palette canvas that stores 2 pixels per byte and can keep each line as a run-list so most of an RLE encode happens during drawing. Includes the PackRLE codec (15 colors + escape nibble), PackFlush (push only the rows that changed), and an ESP32-S3 QSPI AMOLED driver (RM690B0) whose split-polling writes let the CPU prepare the next chunk while the current one is on the wire. Battle-tested at 46+ fps on a 450x600 AMOLED with WiFi and BLE running on the same ESP32-S3.
category=Display
